<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio Admin - Contact Submissions & Downloads</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0f0f0f 0%, #1a1a1a 100%);
            color: #ffffff;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            margin-bottom: 40px;
            text-align: center;
        }

        header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #7c3aed 0%, #f97316 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        header p {
            color: #a0a0a0;
            font-size: 1rem;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: linear-gradient(135deg, rgba(124, 58, 237, 0.1), rgba(124, 58, 237, 0.05));
            border: 1px solid rgba(124, 58, 237, 0.2);
            padding: 30px;
            border-radius: 12px;
            text-align: center;
        }

        .stat-number {
            font-size: 3rem;
            font-weight: 800;
            color: #7c3aed;
            margin-bottom: 10px;
        }

        .stat-label {
            color: #a0a0a0;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .section {
            margin-bottom: 40px;
        }

        .section-title {
            font-size: 1.8rem;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid rgba(124, 58, 237, 0.3);
        }

        .table {
            width: 100%;
            border-collapse: collapse;
            background: rgba(124, 58, 237, 0.05);
            border: 1px solid rgba(124, 58, 237, 0.1);
            border-radius: 8px;
            overflow: hidden;
        }

        .table th {
            background: rgba(124, 58, 237, 0.15);
            padding: 15px;
            text-align: left;
            font-weight: 600;
            color: #7c3aed;
            border-bottom: 1px solid rgba(124, 58, 237, 0.2);
        }

        .table td {
            padding: 15px;
            border-bottom: 1px solid rgba(124, 58, 237, 0.1);
        }

        .table tr:hover {
            background: rgba(124, 58, 237, 0.08);
        }

        .message-preview {
            color: #c0c0c0;
            max-width: 300px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: #808080;
        }

        .empty-state i {
            font-size: 3rem;
            margin-bottom: 20px;
            color: #606060;
        }

        .btn-refresh {
            background: #7c3aed;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            margin-bottom: 20px;
            transition: all 0.3s ease;
        }

        .btn-refresh:hover {
            background: #6d28d9;
            transform: translateY(-2px);
        }

        .time-badge {
            display: inline-block;
            background: rgba(106, 17, 203, 0.2);
            color: #7c3aed;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
        }

        @media (max-width: 768px) {
            header h1 {
                font-size: 1.8rem;
            }

            .table {
                font-size: 0.9rem;
            }

            .table th, .table td {
                padding: 10px;
            }

            .message-preview {
                max-width: 150px;
            }

            .stats-grid {
                grid-template-columns: 1fr;
            }
        }

        .loading {
            text-align: center;
            padding: 40px;
            font-size: 1.2rem;
            color: #808080;
        }

        .error {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            padding: 20px;
            border-radius: 8px;
            color: #ff6b6b;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1><i class="fas fa-chart-bar"></i> Portfolio Admin Dashboard</h1>
            <p>Contact submissions & resume downloads</p>
            <button class="btn-refresh" onclick="loadStats()">
                <i class="fas fa-sync"></i> Refresh Data
            </button>
        </header>

        <div id="error-message"></div>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-number" id="total-messages">-</div>
                <div class="stat-label">Messages Received</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="total-downloads">-</div>
                <div class="stat-label">Resume Downloads</div>
            </div>
        </div>

        <!-- Contact Messages Section -->
        <div class="section">
            <h2 class="section-title"><i class="fas fa-envelope"></i> Contact Messages</h2>
            <div id="messages-container" class="loading">
                <i class="fas fa-spinner fa-spin"></i> Loading messages...
            </div>
        </div>

        <!-- Resume Downloads Section -->
        <div class="section">
            <h2 class="section-title"><i class="fas fa-download"></i> Resume Downloads</h2>
            <div id="downloads-container" class="loading">
                <i class="fas fa-spinner fa-spin"></i> Loading downloads...
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:3000/api/stats';

        async function loadStats() {
            try {
                const response = await fetch(API_URL);
                if (!response.ok) throw new Error('Failed to load stats');

                const data = await response.json();
                updateStats(data);
            } catch (error) {
                console.error('Error:', error);
                showError('Could not load data. Make sure backend is running on http://localhost:3000');
            }
        }

        function updateStats(data) {
            // Update counters
            document.getElementById('total-messages').textContent = data.totalMessages || 0;
            document.getElementById('total-downloads').textContent = data.totalDownloads || 0;

            // Display messages
            const messagesContainer = document.getElementById('messages-container');
            if (data.messages && data.messages.length > 0) {
                let html = `
                    <table class="table">
                        <thead>
                            <tr>
                                <th>Name</th>
                                <th>Email</th>
                                <th>Subject</th>
                                <th>Message</th>
                                <th>Date</th>
                            </tr>
                        </thead>
                        <tbody>
                `;
                
                data.messages.forEach(msg => {
                    const date = new Date(msg.timestamp);
                    const timeStr = date.toLocaleString();
                    html += `
                        <tr>
                            <td><strong>${escapeHtml(msg.name)}</strong></td>
                            <td><a href="mailto:${msg.email}">${escapeHtml(msg.email)}</a></td>
                            <td>${escapeHtml(msg.subject)}</td>
                            <td class="message-preview" title="${escapeHtml(msg.message)}">${escapeHtml(msg.message)}</td>
                            <td><span class="time-badge">${timeStr}</span></td>
                        </tr>
                    `;
                });
                
                html += `
                        </tbody>
                    </table>
                `;
                messagesContainer.innerHTML = html;
            } else {
                messagesContainer.innerHTML = '<div class="empty-state"><i class="fas fa-inbox"></i><p>No messages yet</p></div>';
            }

            // Display downloads
            const downloadsContainer = document.getElementById('downloads-container');
            if (data.downloads && data.downloads.length > 0) {
                let html = `
                    <table class="table">
                        <thead>
                            <tr>
                                <th>Date Downloaded</th>
                                <th>Device/Browser</th>
                                <th>IP Address</th>
                            </tr>
                        </thead>
                        <tbody>
                `;
                
                data.downloads.forEach(dl => {
                    const date = new Date(dl.timestamp);
                    const timeStr = date.toLocaleString();
                    const browserInfo = dl.userAgent ? dl.userAgent.substring(0, 50) + '...' : 'Unknown';
                    html += `
                        <tr>
                            <td><span class="time-badge">${timeStr}</span></td>
                            <td title="${escapeHtml(dl.userAgent)}">${escapeHtml(browserInfo)}</td>
                            <td><code>${escapeHtml(dl.ip)}</code></td>
                        </tr>
                    `;
                });
                
                html += `
                        </tbody>
                    </table>
                `;
                downloadsContainer.innerHTML = html;
            } else {
                downloadsContainer.innerHTML = '<div class="empty-state"><i class="fas fa-file-download"></i><p>No downloads yet</p></div>';
            }
        }

        function showError(message) {
            const errorDiv = document.getElementById('error-message');
            errorDiv.innerHTML = `<div class="error"><i class="fas fa-exclamation-circle"></i> ${message}</div>`;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Load stats on page load
        window.addEventListener('load', loadStats);

        // Auto-refresh every 30 seconds
        setInterval(loadStats, 30000);
    </script>
</body>
</html>
